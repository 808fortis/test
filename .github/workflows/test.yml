name: Build Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar

      - name: Download
        run: curl -L --progress-bar -o firmware.rar "https://pixeldrain.com/api/file/nhdgcMa6?download"

      - name: Extract
        run: |
          unrar x firmware.rar
          rm firmware.rar
          ls -la

      - name: Find scatter files
        id: find
        run: |
          scatter_files=$(find . -type f -name "MT*_Android_scatter.*")
          if [ -z "$scatter_files" ]; then
            echo "No MT*_Android_scatter file found"
            exit 1
          fi
          echo "files=$scatter_files" >> $GITHUB_OUTPUT

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: scatter-files
          path: |
            ${{ steps.find.outputs.files }}
