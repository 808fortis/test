name: Build Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar

      - name: Download
        run: curl -L --progress-bar -o firmware.rar "https://pixeldrain.com/api/file/nhdgcMa6?download"

      - name: Extract
        run: |
          unrar x firmware.rar
          rm firmware.rar
          ls -la

      - name: Find scatter
        id: find
        run: |
          scatter=$(find . -type f -iname "*scatter*" | head -1)
          if [ -z "$scatter" ]; then
            echo "No scatter file found"
            exit 1
          fi
          echo "path=$scatter" >> $GITHUB_OUTPUT

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: scatter
          path: ${{ steps.find.outputs.path }}
