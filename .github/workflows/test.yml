name: Download

on:
  workflow_dispatch:
  push:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download file with progress logging
        run: |
          url="https://pixeldrain.com/api/file/nhdgcMa6?download"
          output="downloaded_file"
          curl -L -o "$output" "$url" --progress-bar 2>&1 | while read -r line; do
            if [[ "$line" =~ ([0-9]+) ]]; then
              bytes="${BASH_REMATCH[1]}"
              mb=$((bytes / 1048576))
              if (( mb >= 500 && mb % 500 < 50 )); then
                echo "Downloaded: ${mb}MB"
              fi
            fi
          done
          echo "Download complete: $(du -h "$output" | cut -f1)"
