name: Build Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Download
        run: |
          curl -L -o downloaded.file "https://pixeldrain.com/api/file/nhdgcMa6?download" --progress-bar 2>&1 | while read line; do
            if [[ "$line" =~ ([0-9]+) ]]; then
              mb=$((${BASH_REMATCH[1]} / 1048576))
              if (( mb >= 500 && mb % 500 < 50 )); then echo "${mb}MB downloaded"; fi
            fi
          done

      - name: Extract if archive
        run: |
          file downloaded.file
          if file downloaded.file | grep -q "Zip archive"; then
            unzip -q downloaded.file
            rm downloaded.file
          elif file downloaded.file | grep -q "gzip compressed"; then
            tar -xzf downloaded.file
            rm downloaded.file
          elif file downloaded.file | grep -q "RAR archive"; then
            unrar x downloaded.file
            rm downloaded.file
          else
            mv downloaded.file ./
          fi

      - name: Find scatter
        id: find
        run: |
          scatter=$(find . -name "MT6833_Android_Scatter.txt" -type f | head -1)
          echo "path=$scatter" >> $GITHUB_OUTPUT

      - name: Run
        run: |
          cargo run -- "${{ steps.find.outputs.path }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: flashable_firmware
          path: |
            flashable_firmware_*
